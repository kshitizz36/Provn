name: Provn CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  provn-scan:
    name: Security scan (Layer 1+2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            provn-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('provn-cli/Cargo.lock') }}

      - name: Build Provn CLI
        run: cd provn-cli && cargo build --release

      - name: Run unit tests
        run: cd provn-cli && cargo test

      - name: Scan diff for secrets/IP leaks
        run: bash ./scripts/ci-scan.sh
