name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: provn-aarch64-apple-darwin
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: provn-x86_64-apple-darwin
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            provn-cli/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('provn-cli/Cargo.lock') }}

      - name: Build release binary
        run: |
          cd provn-cli
          cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: matrix.ext == ''
        run: |
          cp provn-cli/target/${{ matrix.target }}/release/provn provn
          tar czf ${{ matrix.artifact }}.tar.gz provn
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          {
            echo "## Install"
            echo
            echo "**curl installer (macOS, Linux)**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash"
            echo '```'
            echo
            echo "**npm**"
            echo '```bash'
            echo "npm install -g provn"
            echo '```'
            echo
            echo "**Homebrew**"
            echo '```bash'
            echo "brew install kshitizz36/tap/provn"
            echo '```'
            echo
            echo "## Checksums"
            echo
            echo '```text'
            cat artifacts/*.sha256 2>/dev/null || echo 'see attached .sha256 files'
            echo '```'
          } > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Provn ${{ github.ref_name }}"
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
          fail_on_unmatched_files: false
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check npm publishing is configured
        id: npm_auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "NPM_TOKEN not configured; skipping npm publish."
          fi

      - name: Setup Node.js
        if: steps.npm_auth.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        if: steps.npm_auth.outputs.enabled == 'true'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./npm/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match npm package version $PKG_VERSION"
            exit 1
          fi

      - name: Prepare npm package
        if: steps.npm_auth.outputs.enabled == 'true'
        run: |
          cp README.md npm/README.md
          cp LICENSE npm/LICENSE

      - name: Publish to npm
        if: steps.npm_auth.outputs.enabled == 'true'
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
