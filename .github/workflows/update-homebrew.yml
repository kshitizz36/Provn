name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    if: ${{ secrets.TAP_GITHUB_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release assets and compute SHA-256
        id: sha
        run: |
          BASE="https://github.com/kshitizz36/Provn/releases/download/${{ steps.release.outputs.tag }}"

          download_sha() {
            local name=$1
            curl -fsSL "$BASE/$name" -o "/tmp/$name"
            sha256sum "/tmp/$name" | awk '{print $1}'
          }

          echo "sha_aarch64_macos=$(download_sha provn-aarch64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT
          echo "sha_x86_64_macos=$(download_sha provn-x86_64-apple-darwin.tar.gz)" >> $GITHUB_OUTPUT
          echo "sha_aarch64_linux=$(download_sha provn-aarch64-linux.tar.gz)" >> $GITHUB_OUTPUT
          echo "sha_x86_64_linux=$(download_sha provn-x86_64-linux.tar.gz)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: kshitizz36/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA_AARCH64_MACOS: ${{ steps.sha.outputs.sha_aarch64_macos }}
          SHA_X86_64_MACOS: ${{ steps.sha.outputs.sha_x86_64_macos }}
          SHA_AARCH64_LINUX: ${{ steps.sha.outputs.sha_aarch64_linux }}
          SHA_X86_64_LINUX: ${{ steps.sha.outputs.sha_x86_64_linux }}
        run: |
          cd homebrew-tap
          python3 ../scripts/update-homebrew-formula.py Formula/provn.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/provn.rb
          git commit -m "provn $VERSION" || echo "No changes"
          git push
